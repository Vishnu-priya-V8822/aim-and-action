        </div>

<!-- CONTACT -->
<section id="contact">
    <h2 class="section-title">Get in Touch</h2>

    <form>
        <label>Name*</label>
        <input type="text" required>

        <label>Email*</label>
        <input type="email" required>

        <label>Phone</label>
        <input type="tel">

        <label>Message*</label>
        <textarea required></textarea>

        <button type="submit">Send Message</button>
    </form>
</section>
